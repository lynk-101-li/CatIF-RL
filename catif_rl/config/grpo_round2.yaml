# CatIF-RL Round 2 (KL-regularized offline GRPO) — Supporting Information Table S3.
# All hyperparameters identical to Round 1 except the training-run length flag.
# Initial policy: epoch-02 checkpoint of Round 1.

run:
  name: catif_rl_round2
  round: 2
  output_dir: runs/grpo_round2

policy:
  init_ckpt: runs/grpo_round1/policy_epoch02.pt
  reference_ckpt: checkpoints/catif_Sep24_epoch228.pt   # frozen CatIF, same as Round 1

outer_loop:
  group_size: 5
  ddim_step: 100
  sampling_seed: 11
  diverse_decoding: true

inner_loop:
  inner_epochs_operational: 2
  training_run_length: 25       # halved from Round 1 (Table S3)
  warmup_epochs: 0
  lr: 5.0e-6
  weight_decay: 1.0e-2
  optimizer: AdamW
  betas: [0.9, 0.98]
  accum_steps: 1
  grad_clip_norm: 2.0
  amp_fp16: true
  random_seed: 42

reward:
  shaping_mode: lin_sym
  tau: 0.40
  mutation_penalty_weight: 0.10
  mutation_free_fraction: 0.30
  ensemble_normalizer: quantile_10_90

kl_regularization:
  target: 0.01
  clip_per_token_logp_gap: 5.0
  beta_initial: 0.01
  beta_max: 0.50
  beta_min: 5.0e-4
  beta_update_above_target: 1.5
  beta_update_below_target: 0.7

group_filtering:
  min_distinct_rewards: 3
  within_group_sequence_dedup: true

sampling_timestep:
  logp_eval_step: 100
